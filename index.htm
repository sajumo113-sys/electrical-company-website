<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJM Electrical Co. LTD | Professional Electrical Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #edbc1a;
            --secondary: #1a252f;
            --light: #f4f7f6;
            --white: #ffffff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            line-height: 1.6;
            color: #333;
            background: var(--light);
        }
        .navbar {
            background: var(--secondary);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--primary);
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
            cursor: pointer;
        }
        .nav-links a:hover {
            color: var(--primary);
        }
        .contact-phone {
            color: var(--primary);
            font-weight: bold;
            text-decoration: none;
        }
        .hero {
            background: linear-gradient(rgba(26, 37, 47, 0.85), rgba(26, 37, 47, 0.85)), url('https://images.unsplash.com/photo-1621905251189-08b45d6a269e?auto=format&fit=crop&q=80&w=1500');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 100px 5%;
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .hero h1 span {
            color: var(--primary);
        }
        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: var(--primary);
            color: var(--secondary);
        }
        .btn-primary:hover {
            background: #d4a513;
            transform: translateY(-2px);
        }
        .btn-outline {
            border: 2px solid white;
            color: white;
            background: transparent;
        }
        .btn-outline:hover {
            background: white;
            color: var(--secondary);
        }
        .services {
            padding: 60px 5%;
            text-align: center;
            background: var(--white);
        }
        .section-title {
            font-size: 2.5rem;
            color: var(--secondary);
            margin-bottom: 2rem;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .service-card {
            background: var(--light);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .service-card:hover {
            transform: translateY(-5px);
        }
        .service-card i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .service-card h3 {
            color: var(--secondary);
            margin-bottom: 1rem;
        }
        .posts-section {
            padding: 60px 5%;
            background: var(--light);
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .post-card {
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            cursor: pointer;
        }
        .post-card:hover {
            transform: translateY(-5px);
        }
        .post-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .post-card-content {
            padding: 1.5rem;
        }
        .post-card h3 {
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }
        .post-category {
            display: inline-block;
            padding: 3px 10px;
            background: var(--primary);
            color: var(--secondary);
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .form-container {
            background: var(--white);
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: var(--secondary);
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        footer {
            background: var(--secondary);
            color: white;
            padding: 50px 5% 20px;
            border-top: 3px solid var(--primary);
        }
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .footer-col h3 {
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .footer-col a {
            color: var(--primary);
            text-decoration: none;
        }
        .footer-bottom {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        @media (max-width: 768px) {
            .navbar { flex-direction: column; text-align: center; }
            .hero h1 { font-size: 2rem; }
            .section-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // Data storage
    let applications = JSON.parse(localStorage.getItem('sjm_applications') || '[]');
    let blogPosts = JSON.parse(localStorage.getItem('sjm_posts') || '[]');
    let currentPage = 'home';
    
    // Initialize sample data
    if (blogPosts.length === 0) {
        blogPosts = [
            { 
                id: 1, 
                title: "Complete Panel Upgrade - Makindye Commercial Center", 
                content: "We recently completed a full electrical panel upgrade for a commercial building in Makindye. The project involved replacing an outdated 100A panel with a modern 400A 3-phase system.",
                category: "Commercial",
                image: "https://images.unsplash.com/photo-1621905251189-08b45d6a269e?auto=format&fit=crop&q=80&w=800",
                created_at: new Date().toISOString(),
                views: 156
            },
            { 
                id: 2, 
                title: "Modern LED Lighting Installation", 
                content: "Transformed a luxury residential villa with energy-efficient LED lighting throughout. The client reports a 45% reduction in electricity bills.",
                category: "Residential",
                image: "https://images.unsplash.com/photo-1565814329452-e1efa11c5b89?auto=format&fit=crop&q=80&w=800",
                created_at: new Date(Date.now() - 2 * 86400000).toISOString(),
                views: 98
            }
        ];
        localStorage.setItem('sjm_posts', JSON.stringify(blogPosts));
    }
    
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed;bottom:20px;right:20px;padding:15px 25px;border-radius:8px;color:white;z-index:2000;background:${type === 'success' ? '#2ecc71' : '#e74c3c'}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function saveApplications() { localStorage.setItem('sjm_applications', JSON.stringify(applications)); }
    function savePosts() { localStorage.setItem('sjm_posts', JSON.stringify(blogPosts)); }
    
    function navigate(page) {
        currentPage = page;
        render();
    }
    
    function isAdmin() { return localStorage.getItem('adminLoggedIn') === 'true'; }
    
    function adminLogin(password) {
        if (password === 'admin123') {
            localStorage.setItem('adminLoggedIn', 'true');
            navigate('admin');
            showToast('Welcome Admin!', 'success');
        } else {
            showToast('Wrong password! Use: admin123', 'error');
        }
    }
    
    function adminLogout() {
        localStorage.removeItem('adminLoggedIn');
        navigate('home');
        showToast('Logged out', 'success');
    }
    
    function submitApplication(e) {
        e.preventDefault();
        const formData = {
            id: Date.now(),
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            service: document.getElementById('service').value,
            address: document.getElementById('address').value,
            message: document.getElementById('message').value,
            status: 'pending',
            created_at: new Date().toISOString()
        };
        
        if (!formData.name || !formData.phone || !formData.service || !formData.address || !formData.message) {
            showToast('Please fill all required fields', 'error');
            return;
        }
        
        applications.unshift(formData);
        saveApplications();
        document.getElementById('applicationForm').reset();
        showToast('Application submitted! We will contact you soon.', 'success');
    }
    
    function createPost(e) {
        e.preventDefault();
        const newPost = {
            id: Date.now(),
            title: document.getElementById('postTitle').value,
            content: document.getElementById('postContent').value,
            category: document.getElementById('postCategory').value,
            image: document.getElementById('postImage').value,
            created_at: new Date().toISOString(),
            views: 0
        };
        
        if (!newPost.title || !newPost.content) {
            showToast('Please enter title and content', 'error');
            return;
        }
        
        blogPosts.unshift(newPost);
        savePosts();
        document.getElementById('createPostForm').reset();
        showToast('Post published!', 'success');
        renderAdminContent('posts');
    }
    
    function deletePost(id) {
        if (confirm('Delete this post?')) {
            blogPosts = blogPosts.filter(p => p.id !== id);
            savePosts();
            showToast('Post deleted', 'success');
            renderAdminContent('posts');
        }
    }
    
    function deleteApplication(id) {
        if (confirm('Delete this application?')) {
            applications = applications.filter(a => a.id !== id);
            saveApplications();
            showToast('Application deleted', 'success');
            renderAdminContent('applications');
        }
    }
    
    function updateStatus(id, status) {
        const app = applications.find(a => a.id === id);
        if (app) {
            app.status = status;
            saveApplications();
            showToast('Status updated', 'success');
            renderAdminContent('applications');
        }
    }
    
    function renderAdminContent(section) {
        const container = document.getElementById('adminContent');
        if (!container) return;
        
        if (section === 'dashboard') {
            const stats = {
                total: applications.length,
                pending: applications.filter(a => a.status === 'pending').length,
                posts: blogPosts.length
            };
            container.innerHTML = `
                <div class="stat-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;">
                    <div class="stat-card" style="background:white;padding:20px;border-left:4px solid var(--primary);"><div style="font-size:2rem;font-weight:bold;color:var(--primary);">${stats.total}</div><p>Applications</p></div>
                    <div class="stat-card" style="background:white;padding:20px;border-left:4px solid var(--primary);"><div style="font-size:2rem;font-weight:bold;color:var(--primary);">${stats.pending}</div><p>Pending</p></div>
                    <div class="stat-card" style="background:white;padding:20px;border-left:4px solid var(--primary);"><div style="font-size:2rem;font-weight:bold;color:var(--primary);">${stats.posts}</div><p>Posts</p></div>
                </div>
            `;
        } else if (section === 'applications') {
            container.innerHTML = `
                <div class="admin-card" style="background:white;padding:20px;border-radius:10px;">
                    <h2>Applications (${applications.length})</h2>
                    ${applications.map(app => `
                        <div style="padding:10px;border-bottom:1px solid #eee;">
                            <strong>${app.name}</strong> - ${app.service}<br>
                            <small>${app.phone} | ${new Date(app.created_at).toLocaleDateString()}</small><br>
                            <select onchange="updateStatus(${app.id}, this.value)">
                                <option value="pending" ${app.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="contacted" ${app.status === 'contacted' ? 'selected' : ''}>Contacted</option>
                                <option value="completed" ${app.status === 'completed' ? 'selected' : ''}>Completed</option>
                            </select>
                            <button class="delete-btn" onclick="deleteApplication(${app.id})" style="background:#e74c3c;color:white;border:none;padding:5px 10px;margin-left:10px;">Delete</button>
                        </div>
                    `).join('') || '<p>No applications yet</p>'}
                </div>
            `;
        } else if (section === 'posts') {
            container.innerHTML = `
                <div class="admin-card" style="background:white;padding:20px;border-radius:10px;margin-bottom:20px;">
                    <h2>Create New Post</h2>
                    <form id="createPostForm" onsubmit="createPost(event)">
                        <input type="text" id="postTitle" placeholder="Title" style="width:100%;padding:10px;margin-bottom:10px;"><br>
                        <select id="postCategory" style="width:100%;padding:10px;margin-bottom:10px;">
                            <option>Commercial</option><option>Residential</option><option>Industrial</option>
                        </select><br>
                        <textarea id="postContent" rows="5" placeholder="Content" style="width:100%;padding:10px;margin-bottom:10px;"></textarea><br>
                        <input type="text" id="postImage" placeholder="Image URL" style="width:100%;padding:10px;margin-bottom:10px;"><br>
                        <button type="submit" class="btn btn-primary">Publish</button>
                    </form>
                </div>
                <div class="admin-card" style="background:white;padding:20px;border-radius:10px;">
                    <h2>Existing Posts (${blogPosts.length})</h2>
                    ${blogPosts.map(post => `
                        <div style="padding:10px;border-bottom:1px solid #eee;">
                            <strong>${post.title}</strong><br>
                            <small>${new Date(post.created_at).toLocaleDateString()} | ${post.views || 0} views</small>
                            <button onclick="deletePost(${post.id})" style="background:#e74c3c;color:white;border:none;padding:5px 10px;margin-top:5px;">Delete</button>
                        </div>
                    `).join('') || '<p>No posts yet</p>'}
                </div>
            `;
        }
    }
    
    function renderHome() {
        return `
            <section class="hero">
                <h1>SJM Electrical <span>Co. LTD</span></h1>
                <p>Your Trusted Partner for Professional Electrical Solutions in Kampala</p>
                <div>
                    <button onclick="navigate('apply')" class="btn btn-primary">REQUEST A SERVICE</button>
                    <button onclick="navigate('posts')" class="btn btn-outline">VIEW PROJECTS</button>
                </div>
            </section>
            <section class="services">
                <h2 class="section-title">Our Core Services</h2>
                <div class="services-grid">
                    <div class="service-card"><i class="fas fa-home"></i><h3>Residential Wiring</h3><p>Complete home electrical installations and safety inspections.</p></div>
                    <div class="service-card"><i class="fas fa-building"></i><h3>Commercial Solutions</h3><p>Office buildings, retail spaces, and business electrical systems.</p></div>
                    <div class="service-card"><i class="fas fa-industry"></i><h3>3-Phase Power</h3><p>Industrial electrical systems and heavy-duty solutions.</p></div>
                    <div class="service-card"><i class="fas fa-bolt"></i><h3>24/7 Emergency</h3><p>Fast response for electrical faults and urgent repairs.</p></div>
                </div>
            </section>
            <section class="posts-section">
                <h2 class="section-title">Latest Projects</h2>
                <div class="posts-grid">
                    ${blogPosts.slice(0, 2).map(post => `
                        <div class="post-card" onclick="navigate('posts')">
                            <img src="${post.image}" onerror="this.src='https://via.placeholder.com/800x400?text=SJM+Electrical'" alt="${post.title}">
                            <div class="post-card-content">
                                <span class="post-category">${post.category}</span>
                                <h3>${post.title}</h3>
                                <p>${post.content.substring(0, 100)}...</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </section>
            <div style="background: var(--secondary); color: white; text-align: center; padding: 60px 5%;">
                <h2>Need Electrical Work?</h2>
                <button onclick="navigate('apply')" class="btn btn-primary">Get Free Quote</button>
            </div>
        `;
    }
    
    function renderApply() {
        return `
            <div class="form-container">
                <h2 style="text-align:center;color:var(--secondary);">Service Application</h2>
                <p style="text-align:center;">Fill out the form and our team will contact you shortly</p>
                <form id="applicationForm" onsubmit="submitApplication(event)">
                    <div class="form-group"><label>Full Name *</label><input type="text" id="name" required></div>
                    <div class="form-group"><label>Phone Number *</label><input type="tel" id="phone" required></div>
                    <div class="form-group"><label>Email Address</label><input type="email" id="email"></div>
                    <div class="form-group"><label>Service Type *</label>
                        <select id="service" required>
                            <option value="">Select Service</option>
                            <option value="Residential Wiring">Residential Wiring</option>
                            <option value="Commercial Solution">Commercial Solution</option>
                            <option value="Industrial 3-Phase">Industrial 3-Phase</option>
                            <option value="Emergency Repair">Emergency Repair</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Location *</label><input type="text" id="address" required></div>
                    <div class="form-group"><label>Project Description *</label><textarea id="message" rows="5" required></textarea></div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">SUBMIT APPLICATION</button>
                </form>
                <div style="margin-top:20px;text-align:center;">
                    <p>📞 Call us: <a href="tel:0704303277">0704303277</a></p>
                </div>
            </div>
        `;
    }
    
    function renderPosts() {
        return `
            <div style="max-width:1000px;margin:2rem auto;padding:0 1rem;">
                <h1 style="text-align:center;color:var(--secondary);">Electrical Projects</h1>
                <div class="posts-grid" style="grid-template-columns:1fr;">
                    ${blogPosts.map(post => `
                        <div class="post-card">
                            <img src="${post.image}" onerror="this.src='https://via.placeholder.com/800x400?text=SJM+Electrical'" alt="${post.title}">
                            <div class="post-card-content">
                                <span class="post-category">${post.category}</span>
                                <h3>${post.title}</h3>
                                <div class="post-meta" style="color:#888;margin-bottom:10px;">📅 ${new Date(post.created_at).toLocaleDateString()} • 👁️ ${post.views || 0} views</div>
                                <p>${post.content}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div style="background:white;border-radius:10px;padding:2rem;text-align:center;margin-top:2rem;">
                    <h3>Have a Project in Mind?</h3>
                    <button onclick="navigate('apply')" class="btn btn-primary">Request Service</button>
                </div>
            </div>
        `;
    }
    
    function renderAdmin() {
        if (!isAdmin()) {
            return `
                <div style="max-width:400px;margin:100px auto;padding:2rem;background:white;border-radius:15px;">
                    <h2 style="text-align:center;">Admin Login</h2>
                    <input type="password" id="adminPassword" placeholder="Enter password" style="width:100%;padding:12px;margin:1rem 0;">
                    <button onclick="adminLogin(document.getElementById('adminPassword').value)" class="btn btn-primary" style="width:100%;">Login</button>
                    <p style="text-align:center;margin-top:1rem;">Password: admin123</p>
                </div>
            `;
        }
        return `
            <div style="display:flex;min-height:100vh;">
                <div style="width:250px;background:var(--secondary);padding:20px;position:fixed;height:100vh;">
                    <h3 style="color:var(--primary);">SJM Admin</h3>
                    <a href="#" onclick="renderAdminContent('dashboard'); return false;" style="display:block;padding:10px;color:white;text-decoration:none;">📊 Dashboard</a>
                    <a href="#" onclick="renderAdminContent('applications'); return false;" style="display:block;padding:10px;color:white;text-decoration:none;">📋 Applications</a>
                    <a href="#" onclick="renderAdminContent('posts'); return false;" style="display:block;padding:10px;color:white;text-decoration:none;">✍️ Manage Posts</a>
                    <a href="#" onclick="adminLogout(); return false;" style="display:block;padding:10px;color:#e74c3c;text-decoration:none;">🚪 Logout</a>
                </div>
                <div style="margin-left:250px;flex:1;padding:30px;">
                    <div id="adminContent">Loading...</div>
                </div>
            </div>
        `;
    }
    
    function render() {
        let content = '';
        switch(currentPage) {
            case 'home': content = renderHome(); break;
            case 'apply': content = renderApply(); break;
            case 'posts': content = renderPosts(); break;
            case 'admin': content = renderAdmin(); break;
            default: content = renderHome();
        }
        
        document.getElementById('app').innerHTML = `
            <nav class="navbar">
                <a href="#" onclick="navigate('home'); return false;" class="logo">⚡ SJM Electrical</a>
                <div class="nav-links">
                    <a href="#" onclick="navigate('home'); return false;">Home</a>
                    <a href="#" onclick="navigate('posts'); return false;">Projects</a>
                    <a href="#" onclick="navigate('apply'); return false;">Apply</a>
                    <a href="#" onclick="navigate('admin'); return false;">Admin</a>
                </div>
                <a href="tel:0704303277" class="contact-phone">📞 0704303277</a>
            </nav>
            <main>${content}</main>
            <footer>
                <div class="footer-grid">
                    <div class="footer-col"><h3>Contact Us</h3><p>📍 Makindye Salama Road, Opp Nesta Petro Station</p><p>📞 <a href="tel:0704303277">0704303277</a></p><p>📧 <a href="mailto:sajumo1113@gmail.com">sajumo1113@gmail.com</a></p></div>
                    <div class="footer-col"><h3>Quick Links</h3><p><a href="#" onclick="navigate('home'); return false;">Home</a></p><p><a href="#" onclick="navigate('apply'); return false;">Request Service</a></p><p><a href="#" onclick="navigate('posts'); return false;">Projects</a></p></div>
                </div>
                <div class="footer-bottom">&copy; 2026 SJM Electrical Co. LTD. All rights reserved.</div>
            </footer>
        `;
        
        if (currentPage === 'admin' && isAdmin()) {
            renderAdminContent('dashboard');
        }
    }
    
    render();
</script>
</body>
</html>
